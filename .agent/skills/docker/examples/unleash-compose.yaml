services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-unleash_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pass}
      POSTGRES_DB: ${DB_NAME:-unleash}
    volumes:
      - unleash-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-unleash_user} -d ${DB_NAME:-unleash}"]
      interval: 10s
      timeout: 5s
      retries: 5

  unleash:
    image: unleashorg/unleash-server:latest
    restart: always
    ports:
      - "4242:4242"
    environment:
      - DATABASE_URL=postgres://${DB_USER:-unleash_user}:${DB_PASSWORD:-pass}@db:5432/${DB_NAME:-unleash}
      - DATABASE_SSL=false
      - UNLEASH_URL=http://localhost:4242/api/
    depends_on:
      db:
        condition: service_healthy

volumes:
  unleash-db:
